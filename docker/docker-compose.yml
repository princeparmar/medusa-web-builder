# Medusa Web Builder — Docker stack
#
# Host ports (override via ../.env — defaults avoid clashes with local postgres/redis/Next):
#   web 3100, postgres 5433, redis 6380, mailpit UI 8125 / SMTP 1125, deploy-stub 9190
#
# Background jobs (BullMQ + Redis):
#   web     → enqueues jobs to Redis when you scaffold, save, publish, sync registry, etc.
#   worker  → consumes jobs (THIS is the queue processor — there is no separate "queue" container)
#   redis   → message broker for BullMQ
#
# Queues (see packages/core/src/queue/index.ts):
#   project  — scaffold, git.commit, publish, github.provision
#   registry — sync.sections, sync.plugins, github-repo, github-plugins-repo, refresh-versions
#   deploy   — trigger (after GitHub release webhook → K8s / deploy stub)
#
# GitHub App credentials (GITHUB_APP_ID, GITHUB_APP_PRIVATE_KEY) must be in ../.env.
# Loaded via env_file only — do NOT add GITHUB_APP_* to the environment: block (empty ${VAR:-} overrides env_file).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mwb
      POSTGRES_PASSWORD: mwb
      POSTGRES_DB: medusa_web_builder
    ports:
      - "${MWB_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mwb -d medusa_web_builder"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${MWB_REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MWB_MAILPIT_UI_PORT:-8125}:8025"
      - "${MWB_MAILPIT_SMTP_PORT:-1125}:1025"

  # Local stand-in for k8s/deploy-agent.yaml (receives deploy queue webhook POSTs)
  deploy-stub:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./deploy-stub:/app:ro
    command: ["node", "server.mjs"]
    ports:
      - "${MWB_DEPLOY_STUB_PORT:-9190}:9090"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9090/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 3

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://mwb:mwb@postgres:5432/medusa_web_builder
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${MWB_WEB_PORT:-3100}:3000"
    environment:
      DATABASE_URL: postgresql://mwb:mwb@postgres:5432/medusa_web_builder
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-in-production-min-32-chars}
      NEXTAUTH_URL: http://localhost:${MWB_WEB_PORT:-3100}
      NEXT_PUBLIC_MAILPIT_URL: http://localhost:${MWB_MAILPIT_UI_PORT:-8125}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: noreply@medusa-web-builder.local
      GITHUB_ORG: medusa-storefronts
      WORKSPACE_ROOT: /var/builder/shops
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars-min!!}
    volumes:
      - ../../shops:/var/builder/shops
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # BullMQ worker — processes scaffold, git, publish, GitHub provision, registry sync, deploy
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://mwb:mwb@postgres:5432/medusa_web_builder
      REDIS_URL: redis://redis:6379
      GITHUB_ORG: medusa-storefronts
      WORKSPACE_ROOT: /var/builder/shops
      GIT_USER_NAME: Medusa Web Builder
      GIT_USER_EMAIL: builder@medusa-web-builder.local
      DEPLOY_WEBHOOK_URL: http://deploy-stub:9090/deploy
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars-min!!}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      # Registry sync (optional GitHub import; admin panel is source of truth)
      STOREFRONT_COMPONENTS_GITHUB: ${STOREFRONT_COMPONENTS_GITHUB:-https://github.com/princeparmar/storefront-components}
      MEDUSA_PLUGINS_GITHUB: ${MEDUSA_PLUGINS_GITHUB:-https://github.com/SmartByteLabs/medusa-plugins}
      MEDUSA_PLUGINS_PATH: ${MEDUSA_PLUGINS_PATH:-}
    volumes:
      - ../../shops:/var/builder/shops
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      deploy-stub:
        condition: service_healthy

volumes:
  postgres_data:
